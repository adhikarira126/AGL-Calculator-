<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            color: #1d1d1f;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .app-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-subtitle {
            text-align: center;
            font-size: 15px;
            color: #86868b;
            margin-bottom: 36px;
        }

        .section-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #86868b;
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 16px 18px;
            border: 1.5px solid #e5e5ea;
            border-radius: 14px;
            font-size: 17px;
            font-family: inherit;
            color: #1d1d1f;
            background: #f5f5f7;
            transition: all 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #007aff;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 4px;
        }

        .grid .input-group {
            margin-bottom: 0;
        }

        .grid .input-group.full-width {
            grid-column: 1 / -1;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 122, 255, 0.4);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 24px;
            padding: 24px;
            background: #f5f5f7;
            border-radius: 18px;
            border: 1px solid #e5e5ea;
            display: none;
            text-align: center;
        }

        .result-box.show {
            display: block;
            animation: fadeInUp 0.4s ease;
        }

        .result-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #86868b;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .signal-badge {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .signal-buy {
            background: rgba(52, 199, 89, 0.12);
            color: #34c759;
            border: 1.5px solid rgba(52, 199, 89, 0.3);
        }

        .signal-sell {
            background: rgba(255, 59, 48, 0.12);
            color: #ff3b30;
            border: 1.5px solid rgba(255, 59, 48, 0.3);
        }

        .signal-hold {
            background: rgba(255, 149, 0, 0.12);
            color: #ff9500;
            border: 1.5px solid rgba(255, 149, 0, 0.3);
        }

        .error-msg {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 14px;
            text-align: center;
            display: none;
            background: rgba(255, 59, 48, 0.08);
            padding: 10px 16px;
            border-radius: 12px;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        @media (max-width: 480px) {
            body { padding: 20px 16px; }
            .card { padding: 28px; border-radius: 24px; }
            .app-title { font-size: 28px; }
            .result-value { font-size: 30px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app-container">
        <div class="card">
            <div class="app-title">Backtest</div>
            <div class="app-subtitle">Run a strategy and get a Buy / Sell signal</div>

            <div class="grid">
                <div class="input-group">
                    <label class="section-label">Ticker</label>
                    <input type="text" id="ticker" placeholder="AAPL">
                </div>
                <div class="input-group">
                    <label class="section-label">Days</label>
                    <input type="number" id="days" placeholder="30" min="1">
                </div>
                <div class="input-group full-width">
                    <label class="section-label">Starting Cash ($)</label>
                    <input type="number" id="cash" placeholder="10000" min="0" step="100">
                </div>
            </div>

            <button class="action-btn" id="runBtn" onclick="runBacktest()">
                <span class="btn-content">
                    <span class="spinner" id="spinner"></span>
                    <span id="btnText">Run Backtest</span>
                </span>
            </button>

            <div class="error-msg" id="errorMsg"></div>

            <div class="result-box" id="resultBox">
                <div class="result-label">Backtest Result</div>
                <div class="result-value" id="resultValue">--</div>
                <div class="signal-badge" id="signalBadge">--</div>
            </div>
        </div>
    </div>

    <script>
        async function runBacktest() {
            // 1. Grab values from the 3 input fields
            const ticker = document.getElementById('ticker').value.trim().toUpperCase();
            const days = document.getElementById('days').value;
            const cash = document.getElementById('cash').value;

            const errorMsg = document.getElementById('errorMsg');
            const resultBox = document.getElementById('resultBox');
            const resultValue = document.getElementById('resultValue');
            const signalBadge = document.getElementById('signalBadge');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            const runBtn = document.getElementById('runBtn');

            // Validation
            if (!ticker || !days || !cash) {
                errorMsg.textContent = 'Please fill in all fields (ticker, days, cash).';
                errorMsg.style.display = 'block';
                resultBox.classList.remove('show');
                return;
            }

            errorMsg.style.display = 'none';
            resultBox.classList.remove('show');

            // Loading state
            spinner.style.display = 'inline-block';
            btnText.textContent = 'Running...';
            runBtn.disabled = true;

            try {
                // 2. Send those values to your Flask /backtest route
                const response = await fetch('/backtest', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ticker: ticker,
                        days: parseInt(days),
                        cash: parseFloat(cash)
                    })
                });

                // 3. Receive the result back
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Backtest failed');
                }

                // 4. Display result + calculate Buy / Sell / Hold signal
                const finalValue = data.result !== undefined ? data.result : data.final_value;
                const startCash = parseFloat(cash);
                const profit = finalValue - startCash;
                const pct = ((profit / startCash) * 100).toFixed(2);

                resultValue.textContent = `$${finalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

                // Determine signal
                let signal, signalClass;
                if (pct > 2) {
                    signal = 'Buy';
                    signalClass = 'signal-buy';
                } else if (pct < -2) {
                    signal = 'Sell';
                    signalClass = 'signal-sell';
                } else {
                    signal = 'Hold';
                    signalClass = 'signal-hold';
                }

                signalBadge.textContent = `${signal} (${pct > 0 ? '+' : ''}${pct}%)`;
                signalBadge.className = 'signal-badge ' + signalClass;

                resultBox.classList.add('show');

            } catch (err) {
                // Demo fallback if Flask isn't running
                errorMsg.innerHTML = `<strong>Demo mode:</strong> Flask server not running.<br>
                    Would have sent: <code>{ ticker: "${ticker}", days: ${days}, cash: ${cash} }</code> to <code>/backtest</code>`;
                errorMsg.style.display = 'block';

                // Fake demo result
                const startCash = parseFloat(cash);
                const fakeFinal = startCash * (1 + (Math.random() * 0.2 - 0.05));
                const profit = fakeFinal - startCash;
                const pct = ((profit / startCash) * 100).toFixed(2);

                resultValue.textContent = `$${fakeFinal.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

                let signal, signalClass;
                if (pct > 2) {
                    signal = 'Buy';
                    signalClass = 'signal-buy';
                } else if (pct < -2) {
                    signal = 'Sell';
                    signalClass = 'signal-sell';
                } else {
                    signal = 'Hold';
                    signalClass = 'signal-hold';
                }

                signalBadge.textContent = `${signal} (${pct > 0 ? '+' : ''}${pct}%)`;
                signalBadge.className = 'signal-badge ' + signalClass;

                resultBox.classList.add('show');
            } finally {
                spinner.style.display = 'none';
                btnText.textContent = 'Run Backtest';
                runBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
